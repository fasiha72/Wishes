<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playwrite+NO:wght@100..400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div class="card">
    <h1>❤️ Happy Birthday My Love ❤️</h1>

    <p class="message">
      Happy Birthday to the most amazing husband and the love of my life.
      You are my happiness, my peace, and my greatest blessing.
      Every day with you feels beautiful, and my heart is filled with gratitude for your love.
    </p>

    <button onclick="showLove()">Open My Heart</button>
  </div>

  <div id="popup" class="popup">
    <div class="popup-content">
      <h2>💖 A Message From My Heart 💖</h2>
      <p id="love-text"></p>
      <button onclick="closeLove()">Close</button>
    </div>
  </div>

</body>
<script src="./app.js"></script>

</html>
